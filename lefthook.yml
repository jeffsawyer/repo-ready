pre-commit:
  commands:
    format:
      glob: '**/*.{js,jsx,ts,tsx}'
      run: npx prettier --write {staged_files} && git add {staged_files}
    lint:
      glob: '**/*.{js,jsx,ts,tsx}'
      run: npx eslint --fix {staged_files} && git add {staged_files}

prepare-commit-msg:
  scripts:
    'add-tracked-issue.sh':
      runner: sh

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
